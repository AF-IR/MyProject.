# .github/workflows/download.yml
name: Download File

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'https://yazd.ac.ir/Upload/modules/files/documents/pages/offices/research/deputy/publications/books/printed/98-2.pdf'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        run: |
          curl -L -o output.zip "${{ inputs.url }}"
      
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: output.zip
